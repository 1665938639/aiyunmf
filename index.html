<html lang="zh-CN">
<head>

    <title>爱云码付-用心打造个人免签便捷支付平台-码支付</title>

    <meta name="keywords" content="码支付,爱云码付,聚合支付,免签,免签支付,免签码支付">
    <meta name="description" content="爱云码付是一家专业为个人及中小企业提供支付接入功能的平台。平台自创建以来深受用户认可，为广大用户提供了便捷化的操作和支付接入功能。">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #1e293b;
            --text: #334155;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--light);
            background-image: 
                radial-gradient(#ffffff 1px, transparent 1px),
                radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 高级背景效果 */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(59,130,246,0.05) 0%, rgba(16,185,129,0.05) 100%);
            overflow: hidden;
        }
        
        .bg-overlay::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            filter: blur(40px);
        }
        
        .bg-overlay::after {
            content: '';
            position: absolute;
            bottom: 10%;
            right: 10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
            filter: blur(40px);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        
        .hero-content {
            display: flex;
            align-items: center;
            gap: 50px;
            width: 100%;
        }
        
        .text-content {
            flex: 1;
        }
        
        .hero-heading {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
        }
        
        .hero-heading::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            border-radius: 4px;
        }
        
        .slogan {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.9rem;
            margin-bottom: 25px;
            max-width: 800px;
            line-height: 1.6;
        }
        
        .stats-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 20px 30px;
            display: inline-flex;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        
        .stats-card i {
            color: var(--accent);
            font-size: 2rem;
            margin-right: 15px;
        }
        
        .running-days {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .days-count {
            color: var(--danger);
            font-weight: 800;
            margin: 0 5px;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 40px;
        }
        
        .btn {
            padding: 14px 32px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            color: white;
            border: none;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            z-index: -1;
            transition: transform 0.5s ease;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
        }
        
        .btn-primary::after {
            transform: scaleX(0);
            transform-origin: right;
            background: linear-gradient(45deg, var(--primary-dark), var(--primary));
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, var(--accent), #059669);
        }
        
        .btn-secondary::after {
            transform: scaleX(0);
            transform-origin: right;
            background: linear-gradient(45deg, #059669, var(--accent));
        }
        
        .btn-tertiary {
            background: linear-gradient(45deg, #8b5cf6, #7c3aed);
        }
        
        .btn-tertiary::after {
            transform: scaleX(0);
            transform-origin: right;
            background: linear-gradient(45deg, #7c3aed, #8b5cf6);
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        
        .btn:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        .btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .illustration-container {
            flex: 1;
            position: relative;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .illustration {
            max-width: 100%;
            height: auto;
            max-height: 500px;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.15));
            animation: float 6s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }
        
        .illustration-bg {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--primary) 0%, transparent 60%);
            filter: blur(50px);
            opacity: 0.15;
            z-index: 1;
            border-radius: 50%;
            animation: pulse 8s infinite alternate;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }
        
        /* 雪花效果 */
        #Snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            background: rgba(125,137,95,0.1);
            pointer-events: none;
        }
        
        /* 响应式设计 - 修复移动端问题 */
        @media (max-width: 992px) {
            .hero-heading {
                font-size: 2.8rem;
            }
            
            .slogan {
                font-size: 1.5rem;
            }
            
            .illustration {
                max-height: 400px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 60px 20px;
                height: auto;
            }
            
            .hero-content {
                flex-direction: column;
                text-align: center;
            }
            
            .hero-heading {
                font-size: 2.3rem;
            }
            
            .slogan {
                font-size: 1.3rem;
            }
            
            .stats-card {
                padding: 15px 20px;
                margin: 0 auto 30px;
            }
            
            .running-days {
                font-size: 1.25rem;
            }
            
            /* 移动端按钮保持小图标样式 */
            .btn {
                padding: 12px 24px;
                font-size: 1rem;
                width: auto; /* 保持自然宽度 */
            }
            
            .btn-group {
                justify-content: center;
            }
            
            .illustration-container {
                margin-top: 40px;
                width: 100%;
            }
            
            .illustration {
                max-height: 350px;
            }
        }
        
        @media (max-width: 576px) {
            .hero-heading {
                font-size: 2rem;
            }
            
            .slogan {
                font-size: 2.0rem;
            }
            
            .btn {
                padding: 10px 20px; /* 移动端按钮稍小但保持图标 */
                font-size: 0.9rem;
            }
            
            .btn i {
                margin-right: 8px;
                font-size: 1rem;
            }
            
            .stats-card {
                padding: 12px 18px;
            }
            
            .running-days {
                font-size: 1.1rem;
            }
            
            .illustration {
                max-height: 280px;
            }
        }
        
        /* 小屏幕优化 */
        @media (max-width: 480px) {
            .btn {
                padding: 18px 18px; /* 保持小按钮样式 */
                font-size: 0.9rem;
            }
            
            .btn i {
                margin-right: 6px;
                font-size: 0.9rem;
            }
            
            .illustration {
                max-height: 250px;
            }
        }
        
        /* 水波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.2);
            transform: scale(0);
            animation: ripple 3s infinite;
            pointer-events: none;
        }
        
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // 安全运行天数计算
        document.addEventListener('DOMContentLoaded', function() {
            const startDate = new Date("2020-10-01");
            const now = new Date();
            const diffTime = Math.abs(now - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('days-counter').textContent = diffDays;
        });
    </script>
