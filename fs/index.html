<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Finalshell计算</title>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4">Finalshell计算</h1>
        <label for="machineCode" class="block mb-2">输入机器码:</label>
        <input type="text" id="machineCode" class="border border-gray-300 p-2 w-full mb-4">
        <button id="calculateButton" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">计算</button>
        <div id="result" class="mt-4"></div>
        
        <h1 class="text-2xl font-bold mb-4">防更新教程</h1>
        <p>用火绒安全将 45.56.98.223 添加到 IP 黑名单即可<br>
        （火绒安全开启IP黑名单功能）</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        function md5(str) {
            const hash = CryptoJS.MD5(str).toString();
            return hash.slice(8, 24);
        }

        function keccak384(str) {
            const hash = CryptoJS.algo.SHA3.create({
                outputLength: 384
            });
            hash.update(str);
            return hash.finalize().toString().slice(12, 28);
        }

        document.getElementById('calculateButton').addEventListener('click', function () {
            const code = document.getElementById('machineCode').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<h3 class="font-bold mb-2">计算结果：</h3>';

            if (!code) {
                resultDiv.innerHTML += '<p class="text-red-500">请输入机器码</p>';
                return;
            }

            resultDiv.innerHTML += '<p class="font-semibold">版本号 &lt; 3.9.6 (旧版)</p>';
            resultDiv.innerHTML += `<p>高级版: ${md5(`61305${code}8552`)}</p>`;
            resultDiv.innerHTML += `<p>专业版: ${md5(`2356${code}13593`)}</p>`;
            resultDiv.innerHTML += '<hr class="my-2">';

            resultDiv.innerHTML += '<p class="font-semibold">版本号 >= 3.9.6 (新版)</p>';
            resultDiv.innerHTML += `<p>高级版: ${keccak384(`${code}hSf(78cvVlS5E)`)}</p>`;
            resultDiv.innerHTML += `<p>专业版: ${keccak384(`${code}FF3Go(*Xvbb5s2)`)}</p>`;
            resultDiv.innerHTML += '<hr class="my-2">';

            resultDiv.innerHTML += '<p class="font-semibold">版本号 (4.5)</p>';
            resultDiv.innerHTML += `<p>高级版: ${keccak384(`${code}wcegS3gzA$`)}</p>`;
            resultDiv.innerHTML += `<p>专业版: ${keccak384(`${code}b(xxkHn%z);x`)}</p>`;
            resultDiv.innerHTML += '<hr class="my-2">';

            resultDiv.innerHTML += '<p class="font-semibold">版本号 (4.6)</p>';
            resultDiv.innerHTML += `<p>高级版: ${keccak384(`${code}csSf5*xlkgYSX,y`)}</p>`;
            resultDiv.innerHTML += `<p>专业版: ${keccak384(`${code}Scfg*ZkvJZc,s,Y`)}</p>`;
        });
    </script>
</body>
</html>
